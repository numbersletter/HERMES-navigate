# =============================================================================
# slam_toolbox_params.yaml
# slam_toolbox online_async configuration for HERMES
# ROS 2 Jazzy
# =============================================================================

slam_toolbox:
  ros__parameters:

    # ── Solver ───────────────────────────────────────────────────────────────
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    # ── TF frames ────────────────────────────────────────────────────────────
    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan

    # ── Mode: online asynchronous ────────────────────────────────────────────
    mode: mapping               # mapping | localization
    use_lifecycle_manager: false
    use_map_saver: false

    # ── Timing / performance (real-robot baseline) ───────────────────────────
    debug_logging: false
    throttle_scans: 1           # process every scan
    transform_publish_period: 0.02      # 50 Hz TF
    map_update_interval: 0.05
    resolution: 0.020            # m/cell
    max_laser_range: 12.0         # m — match physical LiDAR max range
    minimum_travel_distance: 0.20
    minimum_travel_heading: 0.20

    # ── Scan matching ────────────────────────────────────────────────────────
    scan_buffer_size: 20
    scan_buffer_maximum_scan_distance: 3.5
    link_match_minimum_response_fine: 0.1
    link_scan_maximum_distance: 2.0
    loop_search_maximum_distance: 8.0
    do_loop_closing: true
    loop_match_minimum_chain_size: 10
    loop_match_maximum_variance_coarse: 3.0
    loop_match_minimum_response_coarse: 0.35
    loop_match_minimum_response_fine: 0.45

    # ── Correlation parameters ───────────────────────────────────────────────
    correlation_search_space_dimension: 0.5
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.1

    # ── Loop closure ─────────────────────────────────────────────────────────
    loop_search_space_dimension: 8.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03

    # ── Distance variance penalty ─────────────────────────────────────────────
    distance_variance_penalty: 0.5
    angle_variance_penalty: 1.0
    fine_search_angle_offset: 0.00349   # 0.2 deg
    coarse_search_angle_offset: 0.349   # 20 deg
    coarse_angle_resolution: 0.0349     # 2 deg
    minimum_angle_penalty: 0.9
    minimum_distance_penalty: 0.5
    use_response_expansion: true

    # ── Occupancy grid ───────────────────────────────────────────────────────
    occupancy_threshold: 0.1
    free_threshold: 0.196
    minimum_pass_through_count: 2
    occupancy_threshold_confidence: 0.6
    free_threshold_confidence: 0.0
