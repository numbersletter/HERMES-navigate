# =============================================================================
# sim_nav2_params.yaml
# Nav2 configuration for HERMES — Gazebo Harmonic simulation
# Identical to nav2_params.yaml but with use_sim_time: false throughout.
# ROS 2 Jazzy / Nav2 latest
# =============================================================================

# ── BT Navigator ──────────────────────────────────────────────────────────────
bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom

# ── Planner Server (Smac 2D) ──────────────────────────────────────────────────
planner_server:
  ros__parameters:
    use_sim_time: false
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_smac_planner::SmacPlanner2D"
      tolerance: 0.10             # Goal tolerance [m] — tighter than default (0.5) to ensure
                                  # the planner reaches close to frontier goals in a small space.
      downsample_costmap: false
      downsampling_factor: 1
      allow_unknown: true
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 2.0
      cost_travel_multiplier: 2.0
      use_final_approach_orientation: false
      smoother:
        max_iterations: 1000
        w_smooth: 0.3
        w_data: 0.2
        tolerance: 1.0e-10

# ── Controller Server (MPPI) ────────────────────────────────────────────────
controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 10.0   # Hz — PC can handle 30 Hz comfortably
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.0
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.5
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.05
      movement_time_allowance: 5.0  # Increased from 1.5 s — tight spaces require more time
                                    # to manoeuvre; 1.5 s was triggering false stuck-detection
                                    # during in-place rotations.

    general_goal_checker:
      stateful: true
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.10
      yaw_goal_tolerance: 0.15

    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
      time_steps: 56
      model_dt: 0.1
      batch_size: 1000
      ax_max: 3.0
      ax_min: -3.0
      ay_max: 0.0
      ay_min: 0.0
      az_max: 3.5
      vx_std: 0.2
      vy_std: 0.0
      wz_std: 0.4
      vx_max: 0.30             # Reduced from 0.5 m/s — 0.5 m/s crosses the entire 1.22 m
                               # enclosure in ~2.4 s, giving MPPI too little time to react.
                               # 0.3 m/s provides smoother, more controllable motion.
      vx_min: -0.20            # Reduced reversing speed for safer tight-space manoeuvres.
      vy_max: 0.0
      wz_max: 1.5              # Reduced from 1.9 rad/s for smoother in-place turns.
      iteration_count: 1
      prune_distance: 0.5      # Reduced from 1.87 m — 1.87 m was larger than the enclosure
                               # diagonal (1.73 m) so the entire path was pruned in one step,
                               # causing the controller to skip intermediate waypoints.
                               # 0.5 m prunes one step at a time for proper path following.
      transform_tolerance: 1.4
      temperature: 0.3
      gamma: 0.015
      motion_model: "DiffDrive"
      visualize: false
      regenerate_noises: false
      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3
      TrajectoryValidator:
        plugin: "mppi::DefaultOptimalTrajectoryValidator"
        collision_lookahead_time: 2.0
        consider_footprint: false
      critics: ["ConstraintCritic", "CostCritic", "GoalCritic", "GoalAngleCritic", "PathAlignCritic", "PathFollowCritic", "PathAngleCritic", "PreferForwardCritic"]
      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 0.5  # Reduced from 1.4 m — 1.4 m is larger than the enclosure
                                    # width, so the robot entered goal-seeking mode from anywhere
                                    # in the space, ignoring path constraints.
      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0
        threshold_to_consider: 0.4  # Reduced from 0.5 m; aligns with reduced vx_max scale.
      PreferForwardCritic:
        enabled: true
        cost_power: 1
        cost_weight: 10.0
        threshold_to_consider: 0.4
      CostCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.81
        critical_cost: 260.0
        consider_footprint: false
        collision_cost: 1000000.0
        near_goal_distance: 0.5
        trajectory_point_step: 2
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 8.0
        max_path_occupancy_ratio: 0.07
        trajectory_point_step: 4
        threshold_to_consider: 0.4   # Reduced from 0.5 m; consistent with other critics.
        offset_from_furthest: 20
        use_path_orientations: true
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 6.0
        offset_from_furthest: 6
        threshold_to_consider: 0.5   # Reduced from 1.4 m — same reasoning as GoalCritic.
      PathAngleCritic:
        enabled: true
        cost_power: 1 
        cost_weight: 4.0
        offset_from_furthest: 4
        threshold_to_consider: 0.4   # Reduced from 0.5 m; consistent with other critics.
        max_angle_to_furthest: 0.5
        mode: 0

# ── Smoother Server ──────────────────────────────────────────────────────────
smoother_server:
  ros__parameters:
    use_sim_time: false
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true

# ── Behavior Server (recovery behaviors) ─────────────────────────────────────
behavior_server:
  ros__parameters:
    use_sim_time: false
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins:
      ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    wait:
      plugin: "nav2_behaviors::Wait"
    assisted_teleop:
      plugin: "nav2_behaviors::AssistedTeleop"
    local_frame: odom
    global_frame: map
    robot_base_frame: base_link
    transform_tolerance: 1.4
    simulate_ahead_time: 2.0
    max_rotational_vel: 0.8
    min_rotational_vel: 0.4
    rotational_acc_lim: 1.5

# ── Global Costmap ────────────────────────────────────────────────────────────
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 5.0
      publish_frequency: 2.0
      robot_radius: 0.075
      transform_tolerance: 1.4
      global_frame: map
      robot_base_frame: base_link
      # Footprint from urdf/hermes_sim.sdf.xacro geometry:
      # base: 0.1143 x 0.1143 m, wheels protrude laterally/rearward.
      resolution: 0.025          # 2.5 cm/cell — matches local costmap and preserves detail
                                 # from the SLAM map (0.020 m/cell).  The 4×4 ft enclosure is
                                 # only 1.22 m wide; at 0.05 m/cell the global costmap was
                                 # only 24×24 cells — far too coarse for reliable frontier
                                 # detection and path planning.
      # footprint: "[[0.071, 0.069], [0.071, -0.069], [-0.078, -0.069], [-0.078, 0.069]]"
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 8.0
          raytrace_min_range: 0.0
          obstacle_max_range: 6.5
          obstacle_min_range: 0.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 4.0
        inflation_radius: 0.12
      always_send_full_costmap: true

# ── Local Costmap (rolling window) ───────────────────────────────────────────
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 10.0
      publish_frequency: 10.0
      robot_radius: 0.075
      global_frame: odom
      robot_base_frame: base_link
      transform_tolerance: 1.4
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.025
      # footprint: "[[0.071, 0.069], [0.071, -0.069], [-0.078, -0.069], [-0.078, 0.069]]"
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 4.5
        inflation_radius: 0.12
      always_send_full_costmap: true

# ── Map Server ───────────────────────────────────────────────────────────────
map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: ""

# ── Map Saver ────────────────────────────────────────────────────────────────
map_saver:
  ros__parameters:
    use_sim_time: false
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: true

# ── AMCL (not used — SLAM toolbox handles localisation) ──────────────────────
# amcl intentionally omitted

# ── Velocity Smoother ────────────────────────────────────────────────────────
velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    max_velocity: [0.30, 0.0, 1.5]    # Matched to MPPI vx_max / wz_max for consistency.
    min_velocity: [-0.20, 0.0, -1.5]  # Matched to MPPI vx_min / -wz_max.
    max_accel: [3.0, 0.0, 3.5]
    max_decel: [-3.0, 0.0, -3.5]
    odom_topic: "/odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0

# ── Collision Monitor (optional safety layer) ─────────────────────────────────
collision_monitor:
  ros__parameters:
    use_sim_time: false
    base_frame_id: base_link
    odom_frame_id: odom
    cmd_vel_in_topic: cmd_vel_smoothed
    cmd_vel_out_topic: cmd_vel
    state_topic: collision_monitor_state
    transform_tolerance: 0.9
    source_timeout: 1.0
    base_shift_correction: true
    stop_pub_timeout: 2.0
    polygons: ["FootprintApproach"]
    FootprintApproach:
      type: "polygon"
      action_type: "approach"
      footprint_topic: "/local_costmap/published_footprint"
      time_before_collision: 1.2
      simulation_time_step: 0.05
      min_points: 6
      visualize: false
      enabled: true
    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: /scan
      min_height: 0.15
      max_height: 2.0
      enabled: true

# ── Docking Server ────────────────────────────────────────────────────────
docking_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 50.0
    initial_perception_timeout: 5.0
    wait_charge_timeout: 5.0
    dock_approach_timeout: 30.0
    undock_linear_tolerance: 0.05
    undock_angular_tolerance: 0.1
    max_retries: 3
    base_frame: "base_link"
    fixed_frame: "odom"
    dock_backwards: false
    dock_prestaging_tolerance: 0.5

    # Types of docks
    dock_plugins: ['simple_charging_dock']
    simple_charging_dock:
      plugin: 'opennav_docking::SimpleChargingDock'
      docking_threshold: 0.05
      staging_x_offset: -0.7
      use_external_detection_pose: true