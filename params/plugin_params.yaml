# =============================================================================
# HERMES Navigate — Plugin Parameters
# =============================================================================
# This file contains runtime-configurable parameters for all pluginlib plugins
# used by hermes_navigate.  It is loaded by the hermes_navigate_launch.py
# launch file and passed to the hermes_navigate_node lifecycle node.
#
# All parameters are nested under the hermes_navigate_node namespace so they
# are accessible via node->get_parameter("<key>").
# =============================================================================

hermes_navigate_node:
  ros__parameters:

    # ── BT configuration ──────────────────────────────────────────────────────
    bt_tick_rate_hz: 10.0       # BT tick frequency [Hz]
    base_frame: "base_link"     # Robot base TF frame
    map_frame: "map"            # Map TF frame
    robot_pose_topic: "/robot_pose"

    # Nav2 BT plugin libraries to load into the BehaviorTree factory.
    # Each library registers its node type(s) via BT_REGISTER_NODES so they
    # are available in any BT XML loaded by this node.  The default list
    # matches the plugin_lib_names used by nav2_bt_navigator (see
    # config/nav2_params.yaml) so that all standard Nav2 BT nodes
    # (PipelineSequence, RateController, GoalReached, etc.) are available.
    # Append or remove entries to customise the set of registered nodes.
    bt_plugins:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_smooth_path_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_assisted_teleop_action_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_globally_updated_goal_condition_bt_node
      - nav2_is_path_valid_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_truncate_path_action_bt_node
      - nav2_truncate_path_local_action_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_path_expiring_timer_condition
      - nav2_distance_traveled_condition_bt_node
      - nav2_single_trigger_bt_node
      - nav2_goal_updated_controller_bt_node
      - nav2_navigate_through_poses_action_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_planner_selector_bt_node
      - nav2_controller_selector_bt_node
      - nav2_goal_checker_selector_bt_node
      - nav2_controller_cancel_bt_node
      - nav2_path_longer_on_approach_bt_node
      - nav2_wait_cancel_bt_node
      - nav2_spin_cancel_bt_node
      - nav2_back_up_cancel_bt_node
      - nav2_assisted_teleop_cancel_bt_node
      - nav2_drive_on_heading_cancel_bt_node
      - nav2_is_battery_low_condition_bt_node

    # ── Frontier search plugin selection ──────────────────────────────────────
    # Change to any other BaseFrontierSearch plugin type to swap the algorithm.
    frontier_search:
      plugin: "hermes_navigate::WavefrontFrontierDetector"

    # ── WavefrontFrontierDetector parameters ──────────────────────────────────
    wavefront_frontier_detector:
      min_frontier_size:   3      # Minimum cells to form a valid frontier cluster
      clustering_distance: 0.5    # Max distance (m) between cells in a cluster
      search_distance:     10.0   # BFS search radius from robot (m); 0 = unlimited

    # ── Cost plugin selection (ordered list; scores are summed) ───────────────
    cost_plugins:
      - "hermes_navigate::InformationGainPlugin"
      - "hermes_navigate::EuclideanPlugin"

    # Canonical parameter-namespace names matching the list above
    cost_plugin_names:
      - "information_gain"
      - "euclidean"

    # ── InformationGainPlugin parameters ──────────────────────────────────────
    # Scores a frontier by the number of unknown cells visible via ray-casting.
    information_gain:
      weight:           1.0   # Score multiplier (positive = attractive)
      max_ray_length_m: 5.0   # Maximum ray length [m]
      num_rays:         36    # Number of rays cast (angular resolution)

    # ── EuclideanPlugin parameters ────────────────────────────────────────────
    # Penalises frontiers that are far from the robot.
    euclidean:
      weight: -0.5            # Negative: larger distance → more-negative contribution

    # ── SelectFrontierNode parameters ─────────────────────────────────────────
    select_frontier:
      hysteresis_factor:   0.15   # Fraction above current score needed to switch goal
      min_frontier_score:  0.0    # Minimum composite score to consider a frontier viable
                                  # (0.0 = accept any frontier with non-negative score)
